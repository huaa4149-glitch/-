<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>共享照片故事簿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 样式代码与之前相同，为保持完整，这里简略，请从之前回复中复制完整样式 */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f5 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .app-header { text-align: center; margin-bottom: 2.5rem; }
        .app-header h1 { font-size: 2.2rem; background: linear-gradient(135deg, #2c3e66, #1b4d3e); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 12px; }
        .app-header h1::before { content: "📸"; font-size: 2rem; background: none; color: #2c5f4c; }
        .sub { color: #5b6e8c; margin-top: 8px; font-size: 0.95rem; }
        .action-panel { background: rgba(255,255,255,0.75); backdrop-filter: blur(2px); border-radius: 2rem; padding: 1.5rem 1.8rem; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.6); }
        .upload-area { display: flex; flex-wrap: wrap; gap: 1.2rem; align-items: flex-end; margin-bottom: 1.2rem; }
        .file-wrapper { flex: 2; min-width: 180px; }
        .file-label { display: inline-block; background: #fff; border: 1.5px dashed #b9cad6; border-radius: 2rem; padding: 0.6rem 1.4rem; font-weight: 500; color: #2c5f4c; cursor: pointer; text-align: center; width: 100%; }
        #photoInput { display: none; }
        .note-input { flex: 3; min-width: 200px; }
        .note-input input { width: 100%; padding: 0.7rem 1.2rem; border-radius: 2rem; border: 1px solid #cfdfea; background: white; }
        .btn-add { background: #2c7a5e; border: none; color: white; padding: 0.7rem 1.8rem; border-radius: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: #1e5f48; transform: translateY(-2px); }
        .search-box { border-top: 1px solid #e2eaf0; padding-top: 1rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .search-box input { flex: 2; padding: 0.6rem 1.2rem; border-radius: 2rem; border: 1px solid #cfdfea; }
        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1.8rem; margin-top: 1rem; }
        .photo-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 12px 24px -12px rgba(0,0,0,0.12); transition: 0.25s; display: flex; flex-direction: column; }
        .photo-card:hover { transform: translateY(-5px); }
        .img-container { background: #f2f4f6; height: 210px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 1rem 1.2rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .photo-note { background: #f8fafd; padding: 0.7rem 0.8rem; border-radius: 1rem; font-size: 0.9rem; border-left: 3px solid #2c7a5e; }
        .note-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; color: #5f7f9a; display: block; margin-bottom: 4px; }
        .photo-meta { font-size: 0.7rem; color: #7e95ae; display: flex; justify-content: space-between; }
        .card-actions { display: flex; gap: 12px; margin-top: 6px; }
        .edit-btn, .delete-btn { border: none; background: transparent; font-size: 0.8rem; padding: 0.4rem 0.9rem; border-radius: 2rem; cursor: pointer; font-weight: 500; }
        .edit-btn { background: #ecf3f9; color: #2c5f6e; }
        .delete-btn { background: #fee9e6; color: #b33a2c; }
        .empty-state { text-align: center; grid-column: 1/-1; background: rgba(255,255,240,0.5); border-radius: 2rem; padding: 3rem; color: #5f7f9a; }
        footer { margin-top: 3rem; text-align: center; font-size: 0.75rem; color: #8aa0b5; border-top: 1px solid #dee6ed; padding-top: 2rem; }
        @media (max-width: 640px) { body { padding: 1rem; } .upload-area { flex-direction: column; align-items: stretch; } .btn-add { justify-content: center; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="app-header">
        <h1>okc成品自选</h1>
        <div class="sub">所有人可看，只有管理员可修改</div>
    </div>

    <div class="action-panel" id="adminPanel" style="display: none;">
        <div class="upload-area">
            <div class="file-wrapper">
                <label class="file-label" for="photoInput">📷 选择照片</label>
                <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp">
            </div>
            <div class="note-input">
                <input type="text" id="photoNoteInput" placeholder="添加备注信息...">
            </div>
            <button class="btn-add" id="addPhotoBtn">✨ 保存照片与备注</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 按备注搜索照片...">
        <button id="adminLoginBtn" class="btn-add" style="background:#3b82f6;">管理员登录</button>
    </div>

    <div id="photosGrid" class="photos-grid"></div>
    <footer>照片存储于 Supabase · 管理员请先登录</footer>
</div>

<script>
    // ========== 请修改为您的 Supabase 配置 ==========
    const SUPABASE_URL = 'https://your-project.supabase.co';     // 替换为您的 Project URL
    const SUPABASE_ANON_KEY = 'your-anon-key';                  // 替换为您的 anon public key
    // =============================================
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const STORAGE_BUCKET = 'photos';

    let isAdmin = false;
    let currentPhotos = [];
    let searchKeyword = '';

    async function adminLogin() {
        const pwd = prompt('请输入管理员密码：');
        if (!pwd) return;
        const { data, error } = await supabase.rpc('verify_admin_password', { password: pwd });
        if (error || !data) {
            alert('密码错误');
            return;
        }
        isAdmin = true;
        document.getElementById('adminPanel').style.display = 'block';
        alert('管理员模式已开启，您可以上传/编辑/删除照片');
        renderPhotos(currentPhotos);
    }

    async function uploadImage(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { error } = await supabase.storage.from(STORAGE_BUCKET).upload(fileName, file);
        if (error) throw error;
        const { data: { publicUrl } } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
        return publicUrl;
    }

    async function addPhoto() {
        if (!isAdmin) { alert('请先以管理员身份登录'); return; }
        const fileInput = document.getElementById('photoInput');
        const note = document.getElementById('photoNoteInput').value.trim();
        if (!fileInput.files.length) { alert('请选择照片'); return; }
        const file = fileInput.files[0];
        if (file.size > 5 * 1024 * 1024) { alert('图片不能超过5MB'); return; }

        try {
            const imageUrl = await uploadImage(file);
            const adminPwd = prompt('再次输入管理员密码以确认操作：');
            if (!adminPwd) return;
            const { data, error } = await supabase.rpc('admin_operation', {
                op_type: 'insert',
                admin_password: adminPwd,
                image_url: imageUrl,
                note: note || '无备注'
            });
            if (error || !data.success) throw new Error(data?.error || error?.message);
            alert('上传成功');
            fileInput.value = '';
            document.getElementById('photoNoteInput').value = '';
            loadPhotos();
        } catch (err) {
            alert('上传失败：' + err.message);
        }
    }

    async function editNote(photoId, currentNote) {
        if (!isAdmin) { alert('请先以管理员身份登录'); return; }
        const newNote = prompt('输入新备注：', currentNote);
        if (newNote === null) return;
        const adminPwd = prompt('输入管理员密码：');
        if (!adminPwd) return;
        const { data, error } = await supabase.rpc('admin_operation', {
            op_type: 'update',
            admin_password: adminPwd,
            photo_id: photoId,
            note: newNote
        });
        if (error || !data.success) {
            alert('更新失败：' + (data?.error || error?.message));
        } else {
            alert('更新成功');
            loadPhotos();
        }
    }

    async function deletePhoto(photoId, imageUrl) {
        if (!isAdmin) { alert('请先以管理员身份登录'); return; }
        if (!confirm('确定删除这张照片吗？')) return;
        const adminPwd = prompt('输入管理员密码：');
        if (!adminPwd) return;
        const { data, error } = await supabase.rpc('admin_operation', {
            op_type: 'delete',
            admin_password: adminPwd,
            photo_id: photoId
        });
        if (error || !data.success) {
            alert('删除失败：' + (data?.error || error?.message));
        } else {
            const fileName = imageUrl.split('/').pop().split('?')[0];
            await supabase.storage.from(STORAGE_BUCKET).remove([fileName]);
            alert('删除成功');
            loadPhotos();
        }
    }

    async function loadPhotos() {
        const { data, error } = await supabase.from('photos').select('*').order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        currentPhotos = data || [];
        renderPhotos(currentPhotos);
    }

    function renderPhotos(photos) {
        const grid = document.getElementById('photosGrid');
        grid.innerHTML = '';
        if (!photos.length) {
            grid.innerHTML = '<div class="empty-state">✨ 暂无照片，管理员请登录后上传~</div>';
            return;
        }
        const filtered = searchKeyword ? photos.filter(p => p.note.includes(searchKeyword)) : photos;
        for (const photo of filtered) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <div class="img-container"><img src="${photo.image_url}" alt="照片" loading="lazy"></div>
                <div class="card-info">
                    <div class="photo-note">📝 ${escapeHtml(photo.note)}</div>
                    <div class="photo-meta">🕒 ${new Date(photo.created_at).toLocaleString()}</div>
                    ${isAdmin ? `
                    <div class="card-actions">
                        <button class="edit-btn" data-id="${photo.id}" data-note="${escapeHtml(photo.note)}">✏️ 编辑</button>
                        <button class="delete-btn" data-id="${photo.id}" data-url="${photo.image_url}">🗑️ 删除</button>
                    </div>
                    ` : ''}
                </div>
            `;
            grid.appendChild(card);
        }
        if (isAdmin) {
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    const note = btn.dataset.note;
                    editNote(id, note);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    const url = btn.dataset.url;
                    deletePhoto(id, url);
                });
            });
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    let timer;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            searchKeyword = e.target.value;
            renderPhotos(currentPhotos);
        }, 300);
    });

    document.getElementById('adminLoginBtn').addEventListener('click', adminLogin);
    document.getElementById('addPhotoBtn').addEventListener('click', addPhoto);
    loadPhotos();
</script>
</body>
</html>
